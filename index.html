<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>3주차 과제2: 계산기</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="stage">
    <div class="stage__title">3주차 과제2 · 계산기 화면</div>

    <div class="calculator">
      <div class="brand-row">
        <span class="brand-row__label">calc.mento</span>
        <span class="brand-row__dot"></span>
      </div>

      <div class="screen">
        <div class="screen__memory">9801</div>
        <div class="screen__main">10x10</div>
      </div>

      <div class="keys">
        <button class="key key--func">CE</button>
        <button class="key key--func">MR</button>
        <button class="key key--op">%</button>
        <button class="key key--op">/</button>

        <button class="key">7</button>
        <button class="key">8</button>
        <button class="key">9</button>
        <button class="key key--op">x</button>

        <button class="key">4</button>
        <button class="key">5</button>
        <button class="key">6</button>
        <button class="key key--op">-</button>

        <button class="key">1</button>
        <button class="key">2</button>
        <button class="key">3</button>
        <button class="key key--op key--plus">+</button>

        <button class="key key--zero">0</button>
        <button class="key">.</button>
        <button class="key key--op">=</button>
      </div>
    </div>

    <p class="caption">
      화면 구성만 담당하는 정적(static) 마크업입니다. 버튼 클릭 시 별도의 이벤트나 계산 로직은 연결되어 있지 않습니다.
    </p>
  </div>

</body>
</html>
