<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조국현 포트폴리오 | 계산기</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar-wrapper">
        <nav class="navbar">
            <div class="nav-logo">KUKHYUN.DEV</div>
            <div class="nav-links">
                <a href="index.html" class="active">Calculator</a>
                <a href="intro.html">Slide Intro</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <h1 class="main-title">🧮 2주 차 과제: 웹 계산기 화면 구현</h1>
        
        <div class="main-hero text-center">
            <div class="header">
                <span class="badge">CSS Grid & Flexbox 기반 레이아웃</span>
            </div>
            
            <div class="calculator">
                <div class="calc-display">
                    <div class="calc-formula">125 × 4</div>
                    <div class="calc-current">500</div>
                </div>
                
                <div class="calc-keypad">
                    <button class="btn-calc btn-op">C</button>
                    <button class="btn-calc btn-op">+/-</button>
                    <button class="btn-calc btn-op">%</button>
                    <button class="btn-calc btn-action">÷</button>
                    <button class="btn-calc">7</button>
                    <button class="btn-calc">8</button>
                    <button class="btn-calc">9</button>
                    <button class="btn-calc btn-action">×</button>
                    <button class="btn-calc">4</button>
                    <button class="btn-calc">5</button>
                    <button class="btn-calc">6</button>
                    <button class="btn-calc btn-action">─</button>
                    <button class="btn-calc">1</button>
                    <button class="btn-calc">2</button>
                    <button class="btn-calc">3</button>
                    <button class="btn-calc btn-action">+</button>
                    <button class="btn-calc btn-zero">0</button>
                    <button class="btn-calc">.</button>
                    <button class="btn-calc btn-equal">=</button>
                </div>
            </div>

            <div class="mt-40">
                <p class="desc-text">※ 본 화면은 HTML/CSS 레이아웃 마크업 연습용으로, 기능 이벤트는 포함되어 있지 않습니다.</p>
            </div>
        </div>
    </main>

</body>
</html>
